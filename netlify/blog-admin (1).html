<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Admin — carinaannaprav</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#FAFAFA;font-family:'Outfit',sans-serif;font-weight:300;font-size:15px;color:#1A1A1A;padding:40px}
h1{font-size:1.4rem;font-weight:500;margin-bottom:24px}
.form{max-width:700px;background:#fff;border:1px solid #E4E0DC;padding:32px;margin-bottom:24px}
label{display:block;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:#999;margin-bottom:6px;margin-top:16px}
input,textarea,select{width:100%;padding:12px 14px;border:1px solid #E4E0DC;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:300;outline:none;background:#FAFAFA}
input:focus,textarea:focus,select:focus{border-color:#C9A84C}
textarea{min-height:300px;line-height:1.7;resize:vertical}
select{cursor:pointer}
.row{display:flex;gap:12px}.row>*{flex:1}
.btn{display:inline-block;padding:14px 32px;background:#3A3A3A;color:#fff;border:none;font-family:'Outfit',sans-serif;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;cursor:pointer;margin-top:20px}
.btn:hover{background:#2A2A2A}
.btn-outline{background:transparent;color:#3A3A3A;border:1px solid #3A3A3A}
.btn-outline:hover{background:#3A3A3A;color:#fff}
.preview{max-width:700px;background:#fff;border:1px solid #E4E0DC;padding:32px;display:none}
.preview h2{font-family:'Playfair Display',serif;font-weight:400;font-size:1.5rem;margin-bottom:12px}
.preview .tag{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:#C9A84C;margin-bottom:8px}
.preview .body{font-size:0.95rem;color:#555;line-height:1.8}
.preview .body p{margin-bottom:16px}
.preview .body h3{font-family:'Playfair Display',serif;font-weight:400;font-size:1.2rem;margin:24px 0 8px}
#output{max-width:700px;margin-top:20px;background:#F0EEEB;border:1px solid #E4E0DC;padding:20px;font-family:monospace;font-size:0.78rem;line-height:1.5;display:none;white-space:pre-wrap;word-break:break-all}
.info{font-size:0.8rem;color:#999;margin-top:8px}
</style>
</head>
<body>
<h1>Blog Admin</h1>

<div class="form">
  <label>Kategorie</label>
  <select id="tag">
    <option>Content</option><option>Strategie</option><option>Verkaufen</option><option>Hooks</option><option>Mindset</option><option>Systeme</option>
  </select>

  <div class="row">
    <div><label>Titel</label><input id="title" placeholder="Warum dein Content nicht verkauft"></div>
    <div><label>Slug (URL)</label><input id="slug" placeholder="warum-dein-content-nicht-verkauft"></div>
  </div>

  <label>Teaser (1-2 Sätze für Blog-Übersicht)</label>
  <input id="teaser" placeholder="Du postest regelmäßig. Es passiert nichts.">

  <label>Artikel (HTML oder Markdown)</label>
  <textarea id="body" placeholder="<p>Dein Artikeltext hier...</p>

<h3>Zwischenüberschrift</h3>
<p>Weiterer Text...</p>

Tipp: Schreib in <p> Tags. Überschriften in <h3>."></textarea>

  <label>CTA am Ende</label>
  <select id="cta">
    <option value="challenge">Challenge-Anmeldung</option>
    <option value="waitlist">Waitlist CTS</option>
    <option value="none">Kein CTA</option>
  </select>

  <button class="btn" onclick="generatePost()">HTML GENERIEREN</button>
  <button class="btn btn-outline" onclick="showPreview()">VORSCHAU</button>
</div>

<div class="preview" id="preview">
  <p class="tag" id="pTag"></p>
  <h2 id="pTitle"></h2>
  <div class="body" id="pBody"></div>
</div>

<pre id="output"></pre>
<p class="info" id="info"></p>

<script>
function generatePost(){
  const tag=document.getElementById('tag').value;
  const title=document.getElementById('title').value;
  const slug=document.getElementById('slug').value;
  const teaser=document.getElementById('teaser').value;
  const body=document.getElementById('body').value;
  const cta=document.getElementById('cta').value;

  let ctaHtml='';
  if(cta==='challenge') ctaHtml=`<div style="background:#F0EEEB;padding:28px 24px;margin-top:40px;text-align:center"><p style="font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:12px">Kostenlose 3-Tage Challenge</p><p style="font-size:0.85rem;color:#555;margin-bottom:16px">Finde heraus warum dein Content nicht verkauft.</p><a href="../challenge.html" style="display:inline-block;padding:14px 32px;background:#3A3A3A;color:#fff;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none">ICH BIN DABEI</a></div>`;
  if(cta==='waitlist') ctaHtml=`<div style="background:#F0EEEB;padding:28px 24px;margin-top:40px;text-align:center"><p style="font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:12px">Content that Sells — 297€</p><p style="font-size:0.85rem;color:#555;margin-bottom:16px">7 Lektionen. 8 Tools. Dein Content-System.</p><a href="../waitlist.html" style="display:inline-block;padding:14px 32px;background:#3A3A3A;color:#fff;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none">AUF DIE WAITLIST</a></div>`;

  const html=`<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title} — carinaannaprav</title>
<meta name="description" content="${teaser}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--warm:#F0EEEB;--text:#1A1A1A;--text-mid:#555;--text-light:#999;--grey-dark:#3A3A3A;--gold:#C9A84C;--border:#E4E0DC;--serif:'Playfair Display',serif;--sans:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;font-size:17px;line-height:1.8}a{color:var(--gold)}::selection{background:var(--grey-dark);color:#fff}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.nav-logo{font-family:var(--serif);font-weight:400;font-size:1rem;letter-spacing:0.04em;color:var(--text);text-decoration:none}.nav-r{display:flex;gap:24px;align-items:center}.nav-r a{font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:400;color:var(--text-light);transition:color 0.3s;text-decoration:none}.nav-r a:hover{color:var(--gold)}
article{max-width:680px;margin:0 auto;padding:140px 40px 80px}
.tag{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
h1{font-family:var(--serif);font-weight:400;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.3;margin-bottom:24px}
.body p{margin-bottom:20px;color:var(--text-mid);line-height:1.9}
.body h3{font-family:var(--serif);font-weight:400;font-size:1.15rem;margin:32px 0 12px;color:var(--text)}
.body strong{color:var(--text);font-weight:500}
.body blockquote{border-left:2px solid var(--gold);padding-left:20px;margin:24px 0;font-family:var(--serif);font-style:italic;color:var(--text-mid)}
.back{display:block;text-align:center;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-light);margin-top:40px;text-decoration:none}.back:hover{color:var(--gold)}
.foot{max-width:680px;margin:0 auto;padding:32px 40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.foot-sig{font-family:var(--serif);font-style:italic;font-size:0.9rem;color:var(--text-mid)}.foot-links{display:flex;gap:16px}.foot-links a{font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-light);text-decoration:none}.foot-links a:hover{color:var(--gold)}
@media(max-width:768px){.nav{padding:14px 20px}.nav-r a:not(:last-child){display:none}article{padding:120px 24px 60px}.foot{flex-direction:column;gap:12px;text-align:center;padding:24px}}
</style>
</head>
<body>
<nav class="nav"><a href="../index.html" class="nav-logo">carinaannaprav</a><div class="nav-r"><a href="../index.html#produkt">Der Kurs</a><a href="../blog.html" style="color:var(--gold)">Blog</a><a href="https://www.instagram.com/carinaannaprav/" target="_blank">Instagram</a></div></nav>
<article>
<p class="tag">${tag}</p>
<h1>${title}</h1>
<div class="body">
${body}
</div>
${ctaHtml}
<a href="../blog.html" class="back">← Alle Artikel</a>
</article>
<div class="foot"><span class="foot-sig">Carina Anna Prav.</span><div class="foot-links"><a href="../impressum.html">Impressum</a><a href="../datenschutz.html">Datenschutz</a></div></div>
</body>
</html>`;

  document.getElementById('output').style.display='block';
  document.getElementById('output').textContent=html;
  document.getElementById('info').textContent=`Speichern als: blog/${slug}.html — ${html.length} Zeichen`;
}

function showPreview(){
  const p=document.getElementById('preview');
  p.style.display='block';
  document.getElementById('pTag').textContent=document.getElementById('tag').value;
  document.getElementById('pTitle').textContent=document.getElementById('title').value;
  document.getElementById('pBody').innerHTML=document.getElementById('body').value;
}

// Auto-generate slug from title
document.getElementById('title').addEventListener('input',function(){
  const s=this.value.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  document.getElementById('slug').value=s;
});
</script>
</body>
</html>
