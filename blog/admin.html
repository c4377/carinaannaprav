<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Admin — carinaannaprav</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#1C1917;--bg-warm:#231F1D;--burgundy:#8A2E3C;--cream:#F5F0EB;--cream-soft:rgba(245,240,235,0.88);--cream-muted:rgba(245,240,235,0.6);--border:rgba(245,240,235,0.15);--serif:'Times New Roman MT Std','Times New Roman',Times,serif;--sans:'Outfit',sans-serif;--green:#2E8A5C}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--cream);font-family:var(--sans);font-weight:300;font-size:16px;line-height:1.7}
.wrap{max-width:800px;margin:0 auto;padding:40px 20px}
h1{font-family:var(--serif);font-weight:400;font-size:1.6rem;margin-bottom:8px}
.sub{font-size:0.85rem;color:var(--cream-muted);margin-bottom:36px}
label{display:block;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--cream-muted);margin-bottom:6px;margin-top:20px}
input,select,textarea{width:100%;padding:14px 16px;background:var(--bg-warm);border:1px solid var(--border);color:var(--cream);font-family:var(--sans);font-size:0.9rem;font-weight:300;outline:none;border-radius:0;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--burgundy)}
textarea{min-height:300px;resize:vertical;line-height:1.8}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:block;width:100%;padding:16px;background:var(--burgundy);border:1px solid var(--burgundy);color:var(--cream);font-family:var(--sans);font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;margin-top:20px;text-align:center}
.btn:disabled{opacity:0.5}.btn.green{background:var(--green);border-color:var(--green)}
.btn.sec{background:transparent;border-color:var(--border)}
.msg{padding:14px;margin-top:16px;font-size:0.85rem}
.msg.ok{background:rgba(46,138,92,0.15);border:1px solid rgba(46,138,92,0.3);color:#6fde9f}
.msg.err{background:rgba(138,46,60,0.15);border:1px solid rgba(138,46,60,0.3);color:#de6f7f}
.msg a{color:#6fde9f}
.toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.toolbar button{padding:6px 12px;background:var(--bg-warm);border:1px solid var(--border);color:var(--cream-muted);font-family:var(--sans);font-size:0.72rem;cursor:pointer}
.toolbar button:hover{border-color:var(--burgundy);color:var(--cream)}
.preview{margin-top:20px;padding:20px;background:var(--bg-warm);border:1px solid var(--border);display:none}
.preview h3{font-family:var(--serif);font-size:1rem;margin-bottom:12px;color:var(--cream-muted)}
.preview p{font-size:0.9rem;color:var(--cream-soft);line-height:1.8;margin-bottom:10px}
.preview h2{font-family:var(--serif);font-size:1.1rem;margin:20px 0 10px}
.preview strong{color:var(--cream)}
.help{font-size:0.72rem;color:var(--cream-muted);margin-top:6px}
.posts{margin-top:40px;border-top:1px solid var(--border);padding-top:24px}
.posts h2{font-family:var(--serif);font-weight:400;font-size:1.1rem;margin-bottom:16px}
.posts ul{list-style:none}.posts li{padding:10px 0;border-bottom:1px solid var(--border)}
.posts li a{color:var(--cream-soft);font-size:0.85rem}.posts li a:hover{color:var(--burgundy)}
@media(max-width:600px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap" id="login">
<h1>Blog Admin</h1>
<label>Passwort</label>
<input type="password" id="pw" placeholder="Admin-Passwort" onkeydown="if(event.key==='Enter')login()">
<button class="btn" onclick="login()">Einloggen</button>
<div id="lmsg"></div>
</div>

<div class="wrap" id="editor" style="display:none">
<h1>Blog Admin</h1>
<p class="sub">Post schreiben, Publish klicken — vom Handy, von überall.</p>

<label>Titel</label>
<input type="text" id="title" placeholder="z.B. Warum dein Content nicht verkauft" oninput="autoSlug()">

<div class="row">
<div><label>Kategorie</label><select id="tag"><option>CONTENT</option><option>ANGEBOT</option><option>VERKAUF</option><option>STRATEGIE</option><option>MINDSET</option><option>BUSINESS</option></select></div>
<div><label>Slug</label><input type="text" id="slug" placeholder="auto"></div>
</div>

<label>Inhalt</label>
<div class="toolbar">
<button onclick="ins('<p>','</p>')">¶ Absatz</button>
<button onclick="ins('<strong>','</strong>')"><b>B</b> Fett</button>
<button onclick="ins('<h2>','</h2>')">H2</button>
<button onclick="ins('<a href=&quot;../content-that-sells.html&quot;>','</a>')">→ CTS</button>
<button onclick="ins('<a href=&quot;../challenge.html&quot;>','</a>')">→ Challenge</button>
</div>
<textarea id="body" placeholder="Schreib deinen Post hier...

Fließtext wird automatisch in Absätze umgewandelt.
Oder nutze HTML-Tags über die Toolbar."></textarea>
<p class="help">Leere Zeile = neuer Absatz</p>

<button class="btn green" onclick="pub()" id="pbtn">Veröffentlichen</button>
<button class="btn sec" onclick="prev()" style="margin-top:8px">Vorschau</button>
<div id="pmsg"></div>
<div class="preview" id="pv"></div>

<div class="posts">
<h2>Veröffentlichte Posts</h2>
<div id="plist">Lade...</div>
</div>
</div>

<script>
let PW='';
const S=t=>t.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const D=()=>{const m=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];const d=new Date();return m[d.getMonth()]+' '+d.getFullYear()};
const W=t=>(t.includes('<p>')||t.includes('<h2>'))?t:t.split('\n\n').map(p=>p.trim()).filter(p=>p).map(p=>'  <p>'+p+'</p>').join('\n');
function autoSlug(){const s=document.getElementById('slug');if(!s.dataset.m)s.value=S(document.getElementById('title').value)}
document.getElementById('slug').addEventListener('input',function(){this.dataset.m='1'});
function ins(a,b){const t=document.getElementById('body'),s=t.selectionStart,e=t.selectionEnd,x=t.value.substring(s,e);t.value=t.value.substring(0,s)+a+x+b+t.value.substring(e);t.focus()}

function login(){
PW=document.getElementById('pw').value;
fetch('/.netlify/functions/blog-publish',{headers:{'Authorization':'Bearer '+PW}})
.then(r=>{if(r.status===401){document.getElementById('lmsg').innerHTML='<div class="msg err">Falsches Passwort.</div>';PW=''}else{document.getElementById('login').style.display='none';document.getElementById('editor').style.display='block';loadPosts()}})
.catch(()=>{document.getElementById('login').style.display='none';document.getElementById('editor').style.display='block'})
}

function buildHTML(title,tag,slug,body){
const d=D(),c=W(body);
return`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${title} — carinaannaprav</title><meta name="description" content="${title}"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>:root{--bg:#1C1917;--bg-warm:#231F1D;--burgundy:#8A2E3C;--cream:#F5F0EB;--cream-soft:rgba(245,240,235,0.88);--cream-muted:rgba(245,240,235,0.6);--border:rgba(245,240,235,0.15);--serif:'Times New Roman MT Std','Times New Roman',Times,serif;--sans:'Outfit',sans-serif}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--cream);font-family:var(--sans);font-weight:300;font-size:16px;line-height:1.7}a{color:var(--cream);text-decoration:none}.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(28,25,23,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}.nav-logo{font-family:var(--serif);font-weight:400;font-size:1.1rem;letter-spacing:0.08em}.nav-links{display:flex;gap:28px}.nav-links a{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream-muted)}.nav-links a:hover{color:var(--cream)}.content{max-width:700px;margin:0 auto;padding:140px 40px 60px}.content h1{font-family:var(--serif);font-weight:400;font-size:clamp(1.8rem,3.5vw,2.4rem);line-height:1.2;margin-bottom:16px}.content h2{font-family:var(--serif);font-weight:400;font-size:1.3rem;margin:32px 0 14px}.content p{font-size:0.92rem;color:var(--cream-soft);line-height:1.85;margin-bottom:14px}.content p strong{color:var(--cream);font-weight:500}.content a{color:var(--burgundy)}.content a:hover{color:var(--cream)}.tag{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--burgundy);margin-bottom:8px}.date{font-size:0.75rem;color:var(--cream-muted);margin-bottom:32px}.pin-box{margin-top:40px;padding:28px;background:var(--bg-warm);border:1px solid var(--border);text-align:center}.pin-box p{font-family:var(--serif);font-size:1rem;margin-bottom:12px;color:var(--cream-soft)}.pin-btn{display:inline-block;padding:10px 28px;background:var(--burgundy);color:var(--cream);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase}.back{display:inline-block;margin-top:28px;font-size:0.8rem;color:var(--cream-muted)}.back:hover{color:var(--cream)}footer{padding:40px 60px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.foot-sig{font-family:var(--serif);font-style:italic;color:var(--cream-soft)}.foot-links{display:flex;gap:20px}.foot-links a{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream-muted)}.foot-copy{font-size:0.65rem;color:var(--cream-muted);opacity:0.8}@media(max-width:600px){.nav{padding:16px 20px}.nav-links a:not(:first-child){display:none}.content{padding:100px 20px 40px}footer{flex-direction:column;gap:16px;text-align:center;padding:30px 24px}}</style></head><body><nav class="nav"><a href="../index.html" class="nav-logo">carinaannaprav</a><div class="nav-links"><a href="../blog.html">Blog</a><a href="../index.html">Home</a><a href="https://www.instagram.com/carinaannaprav/" target="_blank">Instagram</a></div></nav><div class="content"><p class="tag">${tag} · 5 MIN LESEZEIT</p><h1>${title}</h1><p class="date">${d} · von Carina Anna Prav</p>\n${c}\n<div class="pin-box"><p>Merken & Teilen</p><a href="https://www.pinterest.at/carinaannaprav/" class="pin-btn" target="_blank">Auf Pinterest merken</a></div><a href="../blog.html" class="back">← Alle Artikel</a></div><footer><span class="foot-sig">Carina Anna Prav.</span><div class="foot-links"><a href="../impressum.html">Impressum</a><a href="../datenschutz.html">Datenschutz</a></div><span class="foot-copy">© 2026 carinaannaprav</span></footer></body></html>`}

async function pub(){
const t=document.getElementById('title').value.trim(),tag=document.getElementById('tag').value,s=(document.getElementById('slug').value||S(t)).trim(),b=document.getElementById('body').value.trim(),btn=document.getElementById('pbtn'),msg=document.getElementById('pmsg');
if(!t){msg.innerHTML='<div class="msg err">Titel fehlt.</div>';return}
if(!b){msg.innerHTML='<div class="msg err">Inhalt fehlt.</div>';return}
btn.disabled=true;btn.textContent='Wird veröffentlicht...';msg.innerHTML='';
try{
const r=await fetch('/.netlify/functions/blog-publish',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+PW},body:JSON.stringify({slug:s,html:buildHTML(t,tag,s,b)})});
const d=await r.json();
if(d.success){msg.innerHTML='<div class="msg ok">Live! → <a href="'+d.url+'" target="_blank">'+d.url+'</a><br>In 1-2 Min online.</div>';document.getElementById('title').value='';document.getElementById('slug').value='';document.getElementById('slug').dataset.m='';document.getElementById('body').value='';loadPosts()}
else msg.innerHTML='<div class="msg err">Fehler: '+d.error+'</div>'
}catch(e){msg.innerHTML='<div class="msg err">Netzwerkfehler: '+e.message+'</div>'}
btn.disabled=false;btn.textContent='Veröffentlichen'}

function prev(){const e=document.getElementById('pv');if(e.style.display==='none'||!e.style.display){e.innerHTML='<h3>Vorschau</h3>'+W(document.getElementById('body').value);e.style.display='block'}else e.style.display='none'}

async function loadPosts(){
try{const r=await fetch('/.netlify/functions/blog-publish',{headers:{'Authorization':'Bearer '+PW}});const d=await r.json();
if(d.posts&&d.posts.length)document.getElementById('plist').innerHTML='<ul>'+d.posts.map(p=>'<li><a href="blog/'+p.name+'" target="_blank">'+p.name+'</a></li>').join('')+'</ul>';
else document.getElementById('plist').innerHTML='<p style="color:var(--cream-muted)">Noch keine Posts.</p>'}
catch(e){document.getElementById('plist').innerHTML='<p style="color:var(--cream-muted)">Function noch nicht deployed?</p>'}}
</script>
</body></html>
