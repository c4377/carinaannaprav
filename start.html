<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carina Anna Prav</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            background: #1C1917;
            color: #F5F0EB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        
        /* Portrait Circle with Background Image */
        .portrait {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 0 auto 48px;
            background: url('bilder/portrait-carina.jpg') center center/cover;
            border: 3px solid rgba(245, 240, 235, 0.2);
            box-shadow: 0 0 0 8px rgba(245, 240, 235, 0.08);
        }
        
        /* Headline */
        .headline {
            margin-bottom: 60px;
        }
        
        .headline-kicker {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-style: italic;
            font-weight: 400;
            margin-bottom: 8px;
            line-height: 1.3;
            color: #F5F0EB;
        }
        
        .headline-main {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 12px;
            color: #F5F0EB;
        }
        
        .headline-sub {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 400;
            line-height: 1.4;
            color: #F5F0EB;
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .link-button {
            display: block;
            padding: 22px 32px;
            background: #3A3A3A;
            color: #F5F0EB;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.3s;
            border: 1px solid #57534E;
            font-weight: 400;
        }
        
        .link-button:hover {
            background: #57534E;
            transform: translateY(-2px);
        }
        
        .link-button-primary {
            background: #57534E;
            border-color: #78716C;
        }
        
        .link-button-secondary {
            background: #292524;
            border-color: #44403C;
        }
        
        /* Footer */
        .footer {
            margin-top: 60px;
            font-size: 12px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        
        .footer a {
            color: #F5F0EB;
            text-decoration: none;
            margin: 0 12px;
            transition: opacity 0.3s;
        }
        
        .footer a:hover {
            opacity: 0.7;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .portrait {
                width: 180px;
                height: 180px;
            }
            
            .headline-kicker {
                font-size: 24px;
            }
            
            .headline-main,
            .headline-sub {
                font-size: 28px;
            }
            
            .link-button {
                padding: 20px 24px;
                font-size: 12px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Portrait Circle -->
        <div class="portrait"></div>
        
        <!-- Headline -->
        <div class="headline">
            <div class="headline-kicker">Magnetic Sales Method™:</div>
            <div class="headline-main">Wie du endlich verkaufst —</div>
            <div class="headline-sub">ohne überall gleichzeitig sein zu müssen.</div>
        </div>
        
        <!-- Button Group -->
        <div class="button-group">
            <a href="/3-shifts.html" class="link-button">
                3 Shifts PDF (0€)
            </a>
            
            <a href="/content-that-sells.html" class="link-button link-button-primary">
                Content that Sells (€297)
            </a>
            
            <a href="/mentoring.html" class="link-button link-button-secondary">
                6-Monats Mentoring (€5.555)
            </a>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <a href="/">Website</a>
            <a href="/impressum.html">Impressum</a>
        </div>
    </div>
</body>
</html>
